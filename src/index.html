<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />

		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

		<link
			rel="preconnect"
			href="https://fonts.googleapis.com" />
		<link
			rel="preconnect"
			href="https://fonts.gstatic.com"
			crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Rubik+Dirt&display=swap"
			rel="stylesheet" />

		<title>Battleship by Yves</title>
	</head>
	<body class="color-theme-light">
		<main>
			<div class="hero">
				<div class="hero-image">
					<img
						src="./assets/imgs/battleship-hero-img.png"
						alt="Illustration of a battle ship facing front" />
					<img
						src="./assets/imgs/waves.svg"
						alt="Illustration of ocean waves" />
				</div>
				<div class="header">
					<h1>Battleship</h1>
					<p>by Yves</p>
				</div>
			</div>
			<button class="start-game-btn primary-btn-filled">
				<span class="material-symbols-outlined"> joystick </span>
				<span>Start Game</span>
			</button>
		</main>
	</body>
</html>
